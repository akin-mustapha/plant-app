<!DOCTYPE HTML>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Plant App</title>
    <link type="text/css" rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header>
      <h1>Plant App</h1>
      <nav>
        <ul>
          <li><a href="index.html">Add Plant</a></li>
          <li><a href="plants.html">View Plants</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="plant-list">
        <div class="plant-card">
          <img src="./img/tradescantia.jpeg" alt="Plant Image" class="plant-image">
          <div class="plant-info">
            <h2>Tradescantia</h2>
            <ul>
              <li>Nickname: Zebra Plant</li>
              <li>Status: Healthy</li>
              <li>Scientific Name: Tradescantia zebrina</li>
            </ul>
            <button class="View-Details">View Details</button>
          </div>

        </div>
      </section>
    </main>

  </body>
</html>
